<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>天氣預報</title>
    <style>
        body {font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;margin:2rem;background:#f0f8ff;}
        h1 {text-align:center;}
        #content {max-width:800px;margin:auto;}
        .section {margin-bottom:2rem;}
        .section h2 {margin-bottom:0.5rem;}
        .weather-data {font-size:1.2rem; line-height:1.5;}
        .forecast-table {width:100%;border-collapse:collapse;}
        .forecast-table th, .forecast-table td {border:1px solid #ddd;padding:0.5rem;text-align:center;}
        .forecast-table th {background:#eee;}
    </style>
    <script>
        async function loadWeather(){
            try {
                const resp = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await resp.json();
                // 更新時間
                const updateDiv = document.getElementById('update');
                if(updateDiv){
                    updateDiv.textContent = `資料更新時間：${data.updateTime || ''}`;
                }
                // 氣溫表格（全部）
                const tempDiv = document.getElementById('temperature');
                if(data.temperature && data.temperature.data && tempDiv){
                    let html='<table class="forecast-table"><tr><th>測站</th><th>氣溫 (°C)</th></tr>';
                    data.temperature.data.forEach(t=>{
                        html+=`<tr><td>${t.place}</td><td>${t.value}</td></tr>`;
                    });
                    html+='</table>';
                    tempDiv.innerHTML = html;
                }
                // 濕度表格（全部）
                const humDiv = document.getElementById('humidity');
                if(data.humidity && data.humidity.data && humDiv){
                    let html='<table class="forecast-table"><tr><th>測站</th><th>相對濕度 (%)</th></tr>';
                    data.humidity.data.forEach(h=>{
                        html+=`<tr><td>${h.place}</td><td>${h.value}</td></tr>`;
                    });
                    html+='</table>';
                    humDiv.innerHTML = html;
                }
                // 降雨表格（全部）
                const rainDiv = document.getElementById('rainfall');
                if(data.rainfall && data.rainfall.data && rainDiv){
                    let html='<table class="forecast-table"><tr><th>地區</th><th>降雨量 (mm)</th></tr>';
                    data.rainfall.data.forEach(r=>{
                        html+=`<tr><td>${r.place}</td><td>${r.max}</td></tr>`;
                    });
                    html+='</table>';
                    rainDiv.innerHTML = html;
                }
            } catch(e){
                document.body.innerHTML = '<p>資料載入失敗，請稍後再試。</p>';
                console.error(e);
            }
        }
        window.addEventListener('load',loadWeather);
    </script>
</head>
<body>
    <h1>📍 香港天氣資訊</h1>
    <div id="content">
        <div class="section" id="update"><h2>資料更新時間</h2><p>載入中...</p></div>
        <div class="section" id="temperature"><h2>氣溫</h2><p>載入中...</p></div>
        <div class="section" id="humidity"><h2>相對濕度</h2><p>載入中...</p></div>
        <div class="section" id="rainfall"><h2>降雨量</h2><p>載入中...</p></div>
    </div>
    <p style="text-align:center;margin-top:2rem;">
        <a href="https://data.weather.gov.hk/" target="_blank">資料來源：香港天文台</a>
    </p>
</body>
</html>
